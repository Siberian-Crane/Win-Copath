PackageIdentifier: Siberian_Crane.WinCopath
PackageVersion: 1.0.0
PackageLocale: zh-CN
Publisher: Siberian_Crane
PackageName: Win Copath
License: MIT
ShortDescription: Windows 右键菜单路径复制工具，支持多种路径格式一键复制到剪贴板
Description: |
  在 Windows 文件和文件夹的右键菜单中添加 "Win Copath" 选项，支持四种路径格式复制：
  / (正斜杠)、\ (反斜杠)、"/" (引号正斜杠)、"\\" (引号反斜杠)。
  安装后通过 wcpath on/off 管理右键菜单。
