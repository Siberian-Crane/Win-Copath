name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        run: GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o wcpath.exe .

      - name: Package
        run: zip wcpath-windows-amd64.zip wcpath.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: wcpath-windows-amd64.zip
          generate_release_notes: true
